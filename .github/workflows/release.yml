name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sentinel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sentinel/shared build

      - name: Run database migrations
        working-directory: apps/api
        run: pnpm migrate:ci
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sentinel
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          JWT_SECRET: test-secret

      - name: Run tests
        working-directory: apps/api
        run: pnpm test:coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sentinel
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          JWT_SECRET: test-secret

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-summary
          path: apps/api/coverage/coverage-summary.json
          if-no-files-found: error

  release:
    name: Semantic Release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.check.outputs.published }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Capture version before release
        id: before
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Run semantic-release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect if a new release was published
        id: check
        run: |
          AFTER=$(node -p "require('./package.json').version")
          if [ "${{ steps.before.outputs.version }}" != "$AFTER" ]; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "tag=v$AFTER" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

  docker-full:
    name: Build sentinel (API + Web)
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            paschendale/sentinel:latest
            paschendale/sentinel:${{ needs.release.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-api:
    name: Build sentinel-api (API only)
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            paschendale/sentinel-api:latest
            paschendale/sentinel-api:${{ needs.release.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  coverage-badge:
    name: Update coverage badge
    needs: [test, release]
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage summary
        uses: actions/download-artifact@v4
        with:
          name: api-coverage-summary
          path: .coverage

      - name: Generate coverage badge
        run: |
          node - <<'EOF'
          const fs = require('fs')
          const summary = JSON.parse(fs.readFileSync('.coverage/coverage-summary.json', 'utf8'))
          const pct = Math.round(summary.total.lines.pct)
          const color = pct >= 80 ? '#4c1' : pct >= 60 ? '#dfb317' : '#e05d44'
          const label = 'coverage'
          const value = `${pct}%`
          const lw = 70, vw = 52, h = 20
          const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${lw+vw}" height="${h}">
            <linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <rect rx="3" width="${lw+vw}" height="${h}" fill="#555"/>
            <rect rx="3" x="${lw}" width="${vw}" height="${h}" fill="${color}"/>
            <rect x="${lw}" width="4" height="${h}" fill="${color}"/>
            <rect rx="3" width="${lw+vw}" height="${h}" fill="url(#s)"/>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="${lw/2}" y="15" fill="#010101" fill-opacity=".3">${label}</text>
              <text x="${lw/2}" y="14">${label}</text>
              <text x="${lw+vw/2}" y="15" fill="#010101" fill-opacity=".3">${value}</text>
              <text x="${lw+vw/2}" y="14">${value}</text>
            </g>
          </svg>`
          fs.mkdirSync('.badges', { recursive: true })
          fs.writeFileSync('.badges/coverage.svg', svg)
          console.log(`Coverage badge: ${pct}%`)
          EOF

      - name: Commit coverage badge
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --ff-only origin main
          git add .badges/coverage.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push
